<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Font Changer — Customizations</title>
    <link rel="stylesheet" href="manage.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <img src="../icons/icon-128.png" width="48" height="48" alt="" />
        <div>
          <h1>Customizations</h1>
          <p class="sub">Everything Font Changer is doing, kept on this device.</p>
        </div>
      </header>

      <section class="card">
        <h2>Defaults</h2>
        <p class="note">Used on every site unless that site is customized.</p>
        <ul class="def" id="def-list"></ul>
      </section>

      <section class="card">
        <h2>Customized sites</h2>
        <div id="sites"></div>
      </section>
    </main>

    <script src="common.js"></script>
    <script src="manage.js"></script>
  </body>
</html>
