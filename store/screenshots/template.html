<!DOCTYPE html>
<!--
  App Store screenshot template. One frame per page, sized exactly 1320×2868
  (6.9" iPhone). Select a frame with ?frame=1..6. Drop raw device captures into
  ./screens/ as 1.png … 6.png. Render to PNG with a headless browser, e.g.:
    npx -y playwright screenshot --viewport-size=1320,2868 \
      "store/screenshots/template.html?frame=1" store/screenshots/out/1.png
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f6eddd;
        --ink: #211d16;
        --muted: #6f6552;
        --bezel: #211d16;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { background: #fff; }
      .frame {
        width: 1320px;
        height: 2868px;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 150px 110px 0;
        font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      .caption {
        color: var(--ink);
        font-size: 84px;
        line-height: 1.12;
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        max-width: 1000px;
        margin-bottom: 90px;
      }
      .device {
        width: 940px;
        border: 22px solid var(--bezel);
        border-radius: 92px;
        overflow: hidden;
        box-shadow: 0 60px 120px -40px rgba(40, 28, 10, 0.45);
        background: var(--bezel);
      }
      .device img { width: 100%; display: block; }
      .placeholder {
        width: 100%; aspect-ratio: 1290 / 2796; display: flex;
        align-items: center; justify-content: center; color: #fff8; font-size: 40px;
        background: repeating-linear-gradient(45deg,#2c2820,#2c2820 28px,#241f18 28px,#241f18 56px);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="caption" id="caption"></div>
      <div class="device" id="device"></div>
    </div>
    <script>
      // Edit captions here; keep them short and descriptive.
      const FRAMES = {
        1: "The same page, in a font you can read",
        2: "OpenDyslexic, Lexend, or Atkinson Hyperlegible",
        3: "Set the size, line height, and spacing",
        4: "On everywhere. Off where you want.",
        5: "Your defaults, with per-site overrides",
        6: "No tracking. Nothing leaves your device.",
      };
      const n = new URLSearchParams(location.search).get("frame") || "1";
      document.getElementById("caption").textContent = FRAMES[n] || "";
      const device = document.getElementById("device");
      const img = new Image();
      img.onload = () => device.appendChild(img);
      img.onerror = () => {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = "drop screens/" + n + ".png";
        device.appendChild(ph);
      };
      img.src = "screens/" + n + ".png";
    </script>
  </body>
</html>
